<!DOCTYPE html>
<html>
<head>
<title>Why I Love You</title>

<style>

body{
margin-top:120px;
font-family:Arial;
text-align:center;
background:#ffd6e0;
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Reasons I Love You ❤️</h1>

<p id="text">Click the button 😊</p>

<button onclick="reason()">Show Reason 💕</button>

<br>

<button onclick="next()">Next 💌</button>

<script>

let reasons=[
"You always make me smile 😊",
"You make my life happier",
"You care about me",
"You support me",
"You understand me",
"You make my days better",
"You are my favorite person",
"You make life beautiful",
"I feel happy with you ❤️",
"Sweet little Bunny I Love the most in This Life...💋❤",
"I Love youu so much My Darling..😚💕"
];

function reason(){
document.getElementById("text").innerText=
reasons[Math.floor(Math.random()*reasons.length)];
}

function next(){
window.location.href="quiz.html";
}

</script>

</body>
</html>
