<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry ❤️</title>

<style>

body{
margin-top:150px;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
box-shadow:0 5px 15px rgba(255,0,100,0.4);
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:fixed;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

</style>
</head>

<body>

<h1>Hi ❤️</h1>

<h2>I'm really sorry 🥺</h2>

<p>I made this little app just for you 💌</p>

<button onclick="next()">Read My Apology</button>

<script>

function next(){
window.location.href="apology.html";
}

for(let i=0;i<30;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*5+5)+"s";
document.body.appendChild(heart);
}

</script>

</body>
</html>
